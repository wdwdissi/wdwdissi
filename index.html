<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Mamá</title>
    <style>
        :root {
            --bg-color: #fff5f7;
            --text-color: #5a4a4a;
            --trunk-color: #5d4037;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* --- Header & Timer --- */
        .header {
            text-align: center;
            z-index: 10;
            margin-bottom: 20px;
            animation: fadeIn 2s ease;
        }

        h1 { color: #d63384; font-size: 1.5rem; margin-bottom: 5px; }
        #timer { font-weight: bold; color: #ff4d6d; font-size: 1.1rem; }

        /* --- The Tree --- */
        .canvas {
            position: relative;
            width: 100vw;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .trunk {
            width: 14px;
            height: 0;
            background: var(--trunk-color);
            border-radius: 10px 10px 0 0;
            animation: growTrunk 1.5s ease-out forwards;
            position: relative;
        }

        /* --- Flower Types --- */
        .particle {
            position: absolute;
            transform: scale(0);
            animation: bloom 1s ease-out forwards;
        }

        /* Heart Style */
        .type-heart {
            width: 14px;
            height: 14px;
            background: #ff4d6d;
            transform: rotate(-45deg) scale(0);
        }
        .type-heart::before, .type-heart::after {
            content: ""; position: absolute; width: 14px; height: 14px;
            background: inherit; border-radius: 50%;
        }
        .type-heart::before { top: -7px; left: 0; }
        .type-heart::after { left: 7px; top: 0; }

        /* Sakura Style */
        .type-sakura {
            width: 12px;
            height: 12px;
            background: #ffb7c5;
            border-radius: 50%;
            box-shadow: 8px 0 0 #ffb7c5, -8px 0 0 #ffb7c5, 0 8px 0 #ffb7c5, 0 -8px 0 #ffb7c5;
        }

        /* Daisy Style */
        .type-daisy {
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            border: 4px double white;
        }

        /* --- Controls --- */
        .controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            background: white;
            color: #d63384;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        button:hover { transform: translateY(-3px); background: #ff4d6d; color: white; }

        /* --- Animations --- */
        @keyframes growTrunk { to { height: 150px; } }
        @keyframes bloom { to { transform: scale(var(--size)) translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>Para la mujer más increíble de mi vida</h1>
        <div id="timer">Calculando amor...</div>
    </div>

    <div class="canvas" id="canvas">
        <div class="trunk" id="trunk"></div>
    </div>

    <div class="controls">
        <button onclick="changeFlower('type-heart')">❤️ Corazones</button>
        <button onclick="changeFlower('type-sakura')">🌸 Sakura</button>
        <button onclick="changeFlower('type-daisy')">🌼 Margaritas</button>
    </div>

    <script>
        // 1. TIMER LOGIC
        const startDate = new Date(2001, 4, 13); // Change this to your birth date (Year, Month-1, Day)

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
            const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 365.25)) / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('timer').innerHTML = 
                `${years} años, ${days} días y ${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateTimer, 1000);

        // 2. TREE LOGIC
        const canvas = document.getElementById('canvas');
        let currentType = 'type-heart';

        function changeFlower(type) {
            currentType = type;
            // Clear old flowers
            const oldFlowers = document.querySelectorAll('.particle');
            oldFlowers.forEach(f => f.remove());
            spawnFlowers();
        }

        function spawnFlowers() {
            for (let i = 0; i < 80; i++) {
                setTimeout(() => {
                    const flower = document.createElement('div');
                    flower.className = `particle ${currentType}`;
                    
                    // Logic to position flowers in a "heart/cloud" shape above the trunk
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 100;
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight - 250; // Above the trunk

                    const x = centerX + Math.cos(angle) * radius * 1.3;
                    const y = centerY + Math.sin(angle) * radius;

                    flower.style.left = `${x}px`;
                    flower.style.top = `${y}px`;
                    
                    // Random scale for variety
                    const size = 0.5 + Math.random() * 1;
                    flower.style.setProperty('--size', size);
                    
                    // Hearts need a rotation baseline, others don't
                    if (currentType === 'type-heart') {
                        flower.style.transform = `rotate(-45deg) scale(0)`;
                    }

                    canvas.appendChild(flower);
                }, i * 50);
            }
        }

        // Start initial bloom
        setTimeout(spawnFlowers, 1600);
    </script>
</body>
</html>
