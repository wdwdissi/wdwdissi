<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أحبك دودي</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      touch-action: none; /* evita zoom accidental al tocar */
    }
    canvas {
      display: block;
    }

    #intro-modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, rgba(255, 75, 120, 0.35), rgba(0, 0, 0, 0.92) 65%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .modal-card {
      width: min(92vw, 420px);
      padding: 18px 18px 20px;
      border-radius: 24px;
      background: rgba(15, 10, 18, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45), 0 0 80px rgba(255, 0, 90, 0.18);
      text-align: center;
    }

    .modal-card img {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 18px;
      display: block;
      margin-bottom: 16px;
    }

    .modal-card button {
      appearance: none;
      border: 0;
      padding: 14px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff4d7d, #ff1f5f);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(255, 31, 95, 0.35);
    }

    .modal-card button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div id="intro-modal">
    <div class="modal-card">
      <img src="https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2941.jpeg" alt="image">
      <button id="intro-button" type="button">Click Me</button>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let w, h;
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // frases románticas
    const PHRASES = [
      "I love you", "أحبك", "You are my life", "جنتي",
      "You are my everything", "You are my universe", "Always with you",
      "My world", "My love", "You are special",
      "Only you", "I adore you", "أعشقك🩵🫂", "My Princess", "My Meow", "دندونتي اللذيذة🤏", "سعادتي وفرحي", "مامتي😋", "حلوتي😽"
    ];

    const IMAGE_SOURCES = [
      "https://i.pinimg.com/736x/db/96/d3/db96d357db3fa35fee5e03f6843f2957.jpg",
      "https://i.pinimg.com/736x/0e/e1/90/0ee1907b81c7e88278607a9fe8afbd5b.jpg",
      "https://i.pinimg.com/736x/be/6b/28/be6b282c4aa8338331a660caae22deb8.jpg",
"https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2434.png","https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2460.jpeg","https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2464.jpeg","https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2465.jpeg","https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2517.jpeg","https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2522.jpeg","https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2939.jpeg","https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2940.jpeg"
    ];

    const loadedImages = IMAGE_SOURCES.map(src => {
      const image = new Image();
      image.src = src;
      return image;
    });

    const texts = [];
    const stars = [];
    const hearts = [];
    const floatingImages = [];

    // parámetros ajustados para CELULAR
    const MAX_ACTIVE_TEXTS = 7;
    const MAX_ACTIVE_IMAGES = 3;
    const SPAWN_INTERVAL = 1500; // más rápido que antes (1.5 seg)
    const IMAGE_SPAWN_INTERVAL = 2600;
    let phraseIndex = 0;
    let offsetX = 0, offsetY = 0, zoom = 1;

    // función crear estrellas
    function createStar() {
      return {
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 2000,
        speed: 1 + Math.random()
      };
    }

    // corazones
    function createHeart() {
      return {
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 1600 + 400,
        speed: 1.5 + Math.random()
      };
    }

    // textos en orden
    function spawnTextInOrder(){
      if (texts.length >= MAX_ACTIVE_TEXTS) return;
      const phrase = PHRASES[phraseIndex % PHRASES.length];
      phraseIndex++;
      texts.push({
        text: phrase,
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 1600 + 300,
        speed: 1.8 + Math.random() * 1.2, // más rápido
        baseFont: (w < 600 ? 40 : 60),   // fuente clara en móvil
        glow: 25
      });
    }

    function spawnImage() {
      if (floatingImages.length >= MAX_ACTIVE_IMAGES) return;
      const imageIndex = Math.floor(Math.random() * loadedImages.length);
      floatingImages.push({
        image: loadedImages[imageIndex],
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 1600 + 300,
        speed: 1.3 + Math.random() * 0.9,
        size: w < 600 ? 150 : 220
      });
    }

    // inicializar
    for (let i = 0; i < 400; i++) stars.push(createStar()); // más estrellas
    for (let i = 0; i < 30; i++) hearts.push(createHeart());

    // animación
    function animate() {
      ctx.clearRect(0, 0, w, h);

      // estrellas
      stars.forEach(s => {
        s.z -= s.speed;
        if (s.z <= 0) {
          s.x = Math.random() * w;
          s.y = Math.random() * h;
          s.z = 2000;
        }
        const scale = 300 / s.z * zoom;
        const x = (s.x - w/2 + offsetX) * scale + w/2;
        const y = (s.y - h/2 + offsetY) * scale + h/2;
        ctx.fillStyle = "white";
        ctx.fillRect(x, y, scale*1.5, scale*1.5);
      });

      // textos
      texts.forEach((t, i) => {
        t.z -= t.speed;
        if (t.z <= 0) {
          texts.splice(i,1);
          return;
        }
        const scale = 250 / t.z * zoom;
        const x = (t.x - w/2 + offsetX) * scale + w/2;
        const y = (t.y - h/2 + offsetY) * scale + h/2;
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        ctx.font = `bold ${t.baseFont}px Arial`;
        ctx.fillStyle = "white";
        ctx.shadowColor = "white";
        ctx.shadowBlur = t.glow;
        ctx.textAlign = "center";
        ctx.fillText(t.text, 0, 0);
        ctx.restore();
      });

      // corazones
      hearts.forEach(c => {
        c.z -= c.speed;
        if (c.z <= 0) {
          c.x = Math.random() * w;
          c.y = Math.random() * h;
          c.z = 2000;
        }
        const scale = 220 / c.z * zoom;
        const x = (c.x - w/2 + offsetX) * scale + w/2;
        const y = (c.y - h/2 + offsetY) * scale + h/2;
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale*2, scale*2);
        ctx.font = "bold 28px Arial";
        ctx.fillStyle = "red";
        ctx.shadowColor = "red";
        ctx.shadowBlur = 20;
        ctx.textAlign = "center";
        ctx.fillText("❤", 0, 0);
        ctx.restore();
      });

      // imágenes
      floatingImages.forEach((item, i) => {
        item.z -= item.speed;
        if (item.z <= 0) {
          floatingImages.splice(i, 1);
          return;
        }
        const scale = 240 / item.z * zoom;
        const x = (item.x - w/2 + offsetX) * scale + w/2;
        const y = (item.y - h/2 + offsetY) * scale + h/2;
        const image = item.image;
        if (!image.complete || !image.naturalWidth) return;

        const drawSize = item.size * scale;
        ctx.save();
        ctx.translate(x, y);
        ctx.shadowColor = "rgba(255, 80, 120, 0.55)";
        ctx.shadowBlur = 24;
        ctx.drawImage(image, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
        ctx.restore();
      });

      requestAnimationFrame(animate);
    }

    animate();
    setInterval(spawnTextInOrder, SPAWN_INTERVAL);
    setInterval(spawnImage, IMAGE_SPAWN_INTERVAL);

    // controles para mouse y dedo
    const activePointers = new Map();
    let lastDragX = 0;
    let lastDragY = 0;
    let lastPinchDistance = 0;

    function updatePinchZoom() {
      if (activePointers.size !== 2) {
        lastPinchDistance = 0;
        return;
      }

      const points = [...activePointers.values()];
      const dx = points[0].x - points[1].x;
      const dy = points[0].y - points[1].y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (lastPinchDistance) {
        zoom *= distance / lastPinchDistance;
        zoom = Math.min(Math.max(0.5, zoom), 3);
      }

      lastPinchDistance = distance;
    }

    canvas.addEventListener("pointerdown", e => {
      canvas.setPointerCapture(e.pointerId);
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY, type: e.pointerType });

      if (activePointers.size === 1) {
        lastDragX = e.clientX;
        lastDragY = e.clientY;
      }

      updatePinchZoom();
    });

    canvas.addEventListener("pointermove", e => {
      if (!activePointers.has(e.pointerId)) return;

      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY, type: e.pointerType });

      if (activePointers.size === 1) {
        offsetX += (e.clientX - lastDragX) / 3;
        offsetY += (e.clientY - lastDragY) / 3;
        lastDragX = e.clientX;
        lastDragY = e.clientY;
        return;
      }

      if (activePointers.size === 2) {
        updatePinchZoom();
      }
    });

    function endPointer(e) {
      activePointers.delete(e.pointerId);
      if (activePointers.size < 2) {
        lastPinchDistance = 0;
      }
      if (activePointers.size === 1) {
        const remaining = activePointers.values().next().value;
        lastDragX = remaining.x;
        lastDragY = remaining.y;
      }
    }

    canvas.addEventListener("pointerup", endPointer);
    canvas.addEventListener("pointercancel", endPointer);
    canvas.addEventListener("pointerleave", e => {
      if (e.pointerType === "mouse") {
        endPointer(e);
      }
    });

    const introModal = document.getElementById("intro-modal");
    const introButton = document.getElementById("intro-button");

    function closeIntroModal() {
      introModal.style.display = "none";
    }

    introButton.addEventListener("click", closeIntroModal);
  </script>

  <audio id="bg-music" loop>
  <source src="https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/يحيى_لبان_-_يا_ساطع_الأنوار_KLICKAUD.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bg-music");
const musicSource = "https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/يحيى_لبان_-_يا_ساطع_الأنوار_KLICKAUD.mp3";
const musicStartSeconds = 76;

music.addEventListener("loadedmetadata", () => {
  const currentSource = music.querySelector("source")?.src || "";
  music.currentTime = currentSource === musicSource ? musicStartSeconds : 0;
});

document.body.addEventListener("click", () => {
  music.play();
}, { once:true });

document.body.addEventListener("touchstart", () => {
  music.play();
}, { once:true });
</script>
</body>
</html>
