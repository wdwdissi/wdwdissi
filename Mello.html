<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>أحبك ميمي</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      touch-action: none;
    }

    canvas {
      display: block;
    }

    #intro-modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, rgba(255,75,120,0.35), rgba(0,0,0,0.92) 65%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .modal-card {
      width: min(92vw, 420px);
      padding: 18px 18px 20px;
      border-radius: 24px;
      background: rgba(15, 10, 18, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.45),
        0 0 80px rgba(255,0,90,0.18);
      text-align: center;
    }

    .modal-card img {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 18px;
      display: block;
      margin-bottom: 16px;
    }

    .modal-card button {
      appearance: none;
      border: 0;
      padding: 14px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff4d7d, #ff1f5f);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(255,31,95,0.35);
    }

    .modal-card button:active {
      transform: translateY(1px);
    }
  </style>
</head>

<body>

  <div id="intro-modal">
    <div class="modal-card">
      <img src="https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2941.jpeg" alt="image">
      <button id="intro-button" type="button">Click Me</button>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <audio id="bg-music" loop>
    <source src="https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/Aa.m4a" type="audio/mp4">
  </audio>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let w, h;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resize);
    resize();

    const PHRASES = [
      "I love you",
      "أحبك",
      "You are my life",
      "جنتي",
      "You are my everything",
      "You are my universe",
      "Always with you",
      "My world",
      "My love",
      "You are special",
      "Only you",
      "I adore you",
      "أعشقك🩵🫂",
      "My Princess",
      "My Meow",
      "ميمي اللذيذة🤏",
      "سعادتي وفرحي",
      "مامتي😋",
      "حلوتي😽",
      "أميرتي😍",
      "ديبتي🐺😘",
      "معشوقتي",
      "شطورتي",
      "My Good Girl🤏",
      "My Angel",
      "Sweetie Pie",
      "Pookie bear🐈",
      "My everything",

      "My heartbeat",
      "My sunshine☀️",
      "My soulmate",
      "My forever",
      "Pretty girl🤍",
      "My safe place",
      "Baby girl🫂",
      "My dream girl",
      "My happiness",
      "Queen of my heart👑",
      "My beautiful soul",
      "My little star✨",
      "My moon🌙",
      "Honey bunny🍯🐰",
      "My reason to smile",
      "You complete me",
      "Love of my life",
      "My precious girl💎",
      "Cuddle bug🧸",
      "My heart’s home",
      "My lucky charm🍀",
      "My sweet addiction",
      "My tiny baby🤏🩵",
      "My forever love",
      "My darling",
      "My soft girl☁️",
      "My favorite person🤍",
      "My sweet angel",
      "My one and only",
      "Cutie pie😽",
      "My cuddle princess",
      "My starlight✨",
      "My lovely girl",
      "My sweet world",
      "My baby forever",
      "My comfort person",
      "My rose🌹",
      "My sweetest blessing",
      "My little love",
      "My cute obsession",
      "My warm hug🫂",
      "My tender heart",
      "My pretty baby",
      "My heaven",
      "My calm",
      "My sweetest dream",
      "My home",
      "My beautiful addiction",
      "My sleepy girl😴🤍",
      "My treasure💎",
      "My heart stealer",
      "My lovely princess👑",
      "My everything forever",
      "My gentle soul",
      "My sweetest hello",
      "My favorite notification📱🩵",
      "My late night thought",
      "My perfect girl",
      "My adorable baby",
      "My little universe",
      "My cozy person☁️",
      "My sweetest melody🎶"
    ];

    const IMAGE_SOURCES = [
      "https://i.pinimg.com/736x/db/96/d3/db96d357db3fa35fee5e03f6843f2957.jpg",
      "https://i.pinimg.com/736x/0e/e1/90/0ee1907b81c7e88278607a9fe8afbd5b.jpg",
      "https://i.pinimg.com/736x/be/6b/28/be6b282c4aa8338331a660caae22deb8.jpg",
      "https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2460.jpeg",
      "https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2464.jpeg",
      "https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2465.jpeg",
      "https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2517.jpeg",
      "https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2939.jpeg",
      "https://raw.githubusercontent.com/wdwdissi/wdwdissi/refs/heads/main/IMG_2940.jpeg"
    ];

    const loadedImages = IMAGE_SOURCES.map(src => {
      const img = new Image();
      img.src = src;
      return img;
    });

    const texts = [];
    const stars = [];
    const hearts = [];
    const floatingImages = [];

    const MAX_ACTIVE_TEXTS = 7;
    const MAX_ACTIVE_IMAGES = 3;

    const SPAWN_INTERVAL = 1500;
    const IMAGE_SPAWN_INTERVAL = 2600;

    let phraseIndex = 0;
    let offsetX = 0;
    let offsetY = 0;
    let zoom = 1;

    function createStar() {
      return {
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 2000,
        speed: 1 + Math.random()
      };
    }

    function createHeart() {
      return {
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 1600 + 400,
        speed: 1.5 + Math.random()
      };
    }

    function spawnTextInOrder() {
      if (texts.length >= MAX_ACTIVE_TEXTS) return;

      const phrase = PHRASES[phraseIndex % PHRASES.length];
      phraseIndex++;

      texts.push({
        text: phrase,
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 1600 + 300,
        speed: 1.8 + Math.random() * 1.2,
        baseFont: (w < 600 ? 40 : 60),
        glow: 25
      });
    }

    function spawnImage() {
      if (floatingImages.length >= MAX_ACTIVE_IMAGES) return;

      const imageIndex = Math.floor(Math.random() * loadedImages.length);

      floatingImages.push({
        image: loadedImages[imageIndex],
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 1600 + 300,
        speed: 1.3 + Math.random() * 0.9,
        size: w < 600 ? 150 : 220
      });
    }

    for (let i = 0; i < 400; i++) {
      stars.push(createStar());
    }

    for (let i = 0; i < 30; i++) {
      hearts.push(createHeart());
    }

    function animate() {
      ctx.clearRect(0, 0, w, h);

      stars.forEach(s => {
        s.z -= s.speed;

        if (s.z <= 0) {
          s.x = Math.random() * w;
          s.y = Math.random() * h;
          s.z = 2000;
        }

        const scale = 300 / s.z * zoom;

        const x = (s.x - w / 2 + offsetX) * scale + w / 2;
        const y = (s.y - h / 2 + offsetY) * scale + h / 2;

        ctx.fillStyle = "white";
        ctx.fillRect(x, y, scale * 1.5, scale * 1.5);
      });

      texts.forEach((t, i) => {
        t.z -= t.speed;

        if (t.z <= 0) {
          texts.splice(i, 1);
          return;
        }

        const scale = 250 / t.z * zoom;

        const x = (t.x - w / 2 + offsetX) * scale + w / 2;
        const y = (t.y - h / 2 + offsetY) * scale + h / 2;

        ctx.save();

        ctx.translate(x, y);
        ctx.scale(scale, scale);

        ctx.font = `bold ${t.baseFont}px Arial`;
        ctx.fillStyle = "white";
        ctx.shadowColor = "white";
        ctx.shadowBlur = t.glow;
        ctx.textAlign = "center";

        ctx.fillText(t.text, 0, 0);

        ctx.restore();
      });

      hearts.forEach(c => {
        c.z -= c.speed;

        if (c.z <= 0) {
          c.x = Math.random() * w;
          c.y = Math.random() * h;
          c.z = 2000;
        }

        const scale = 220 / c.z * zoom;

        const x = (c.x - w / 2 + offsetX) * scale + w / 2;
        const y = (c.y - h / 2 + offsetY) * scale + h / 2;

        ctx.save();

        ctx.translate(x, y);
        ctx.scale(scale * 2, scale * 2);

        ctx.font = "bold 28px Arial";
        ctx.fillStyle = "red";
        ctx.shadowColor = "red";
        ctx.shadowBlur = 20;
        ctx.textAlign = "center";

        ctx.fillText("❤", 0, 0);

        ctx.restore();
      });

      floatingImages.forEach((item, i) => {
        item.z -= item.speed;

        if (item.z <= 0) {
          floatingImages.splice(i, 1);
          return;
        }

        const scale = 240 / item.z * zoom;

        const x = (item.x - w / 2 + offsetX) * scale + w / 2;
        const y = (item.y - h / 2 + offsetY) * scale + h / 2;

        const image = item.image;

        if (!image.complete || !image.naturalWidth) return;

        const drawSize = item.size * scale;

        ctx.save();

        ctx.translate(x, y);
        ctx.shadowColor = "rgba(255, 80, 120, 0.55)";
        ctx.shadowBlur = 24;

        ctx.drawImage(
          image,
          -drawSize / 2,
          -drawSize / 2,
          drawSize,
          drawSize
        );

        ctx.restore();
      });

      requestAnimationFrame(animate);
    }

    animate();

    setInterval(spawnTextInOrder, SPAWN_INTERVAL);
    setInterval(spawnImage, IMAGE_SPAWN_INTERVAL);

    const activePointers = new Map();

    let lastDragX = 0;
    let lastDragY = 0;
    let lastPinchDistance = 0;

    function updatePinchZoom() {
      if (activePointers.size !== 2) {
        lastPinchDistance = 0;
        return;
      }

      const points = [...activePointers.values()];

      const dx = points[0].x - points[1].x;
      const dy = points[0].y - points[1].y;

      const distance = Math.sqrt(dx * dx + dy * dy);

      if (lastPinchDistance) {
        zoom *= distance / lastPinchDistance;
        zoom = Math.min(Math.max(0.5, zoom), 3);
      }

      lastPinchDistance = distance;
    }

    canvas.addEventListener("pointerdown", e => {
      canvas.setPointerCapture(e.pointerId);

      activePointers.set(e.pointerId, {
        x: e.clientX,
        y: e.clientY,
        type: e.pointerType
      });

      if (activePointers.size === 1) {
        lastDragX = e.clientX;
        lastDragY = e.clientY;
      }

      updatePinchZoom();
    });

    canvas.addEventListener("pointermove", e => {
      if (!activePointers.has(e.pointerId)) return;

      activePointers.set(e.pointerId, {
        x: e.clientX,
        y: e.clientY,
        type: e.pointerType
      });

      if (activePointers.size === 1) {
        offsetX += (e.clientX - lastDragX) / 3;
        offsetY += (e.clientY - lastDragY) / 3;

        lastDragX = e.clientX;
        lastDragY = e.clientY;

        return;
      }

      if (activePointers.size === 2) {
        updatePinchZoom();
      }
    });

    function endPointer(e) {
      activePointers.delete(e.pointerId);

      if (activePointers.size < 2) {
        lastPinchDistance = 0;
      }

      if (activePointers.size === 1) {
        const remaining = activePointers.values().next().value;

        lastDragX = remaining.x;
        lastDragY = remaining.y;
      }
    }

    canvas.addEventListener("pointerup", endPointer);
    canvas.addEventListener("pointercancel", endPointer);

    canvas.addEventListener("pointerleave", e => {
      if (e.pointerType === "mouse") {
        endPointer(e);
      }
    });

    const introModal = document.getElementById("intro-modal");
    const introButton = document.getElementById("intro-button");

    function closeIntroModal() {
      introModal.style.display = "none";
      music.play();
    }

    introButton.addEventListener("click", closeIntroModal);

    const music = document.getElementById("bg-music");

    music.addEventListener("loadedmetadata", () => {
      music.currentTime = 76;
    });
  </script>

</body>
</html>
